specVersion: "2.5"
metadata:
  name: com.demo.migration.projects.legacy
type: application
framework:
  name: SAPUI5
  version: "1.84.59"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: themelib_sap_belize
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /sap
      configuration:
        baseUri: "http://example-s4hana.local:50000/sap"
